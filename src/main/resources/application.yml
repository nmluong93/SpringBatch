spring:
  application:
    name: simplespringbatch

  # === Main + Batch Metadata Datasource (same DB) ===
  datasource:
    url: jdbc:mysql://localhost:3306/batch_schema?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: batch_user
    password: batchuser
    driver-class-name: com.mysql.cj.jdbc.Driver
  # === Spring Batch Configuration ===
  batch:
    jdbc:
      initialize-schema: never      # This creates BATCH_* tables
    job:
      enabled: false
  # JPA (only if you need it for business data)
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update